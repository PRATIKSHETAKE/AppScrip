<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Trade Opportunities</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
}

h1{
color:#3b82f6;
}

.card{
background:#1e293b;
border:none;
}

textarea{
background:#020617;
color:white;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow p-4">

<h1 class="text-center mb-3">AI Trade Opportunities</h1>

<p class="text-center text-secondary">
Enter a sector to generate AI market analysis
</p>

<div class="input-group mb-3">

<input
id="sector"
type="text"
class="form-control"
placeholder="Example: technology, finance, healthcare"
/>

<button
class="btn btn-primary"
onclick="analyze()"
>
Analyze
</button>

</div>

<div id="loading" class="text-center mt-3" style="display:none">

<div class="spinner-border text-primary"></div>

<p class="mt-2">Generating AI analysis...</p>

</div>

<div id="result" class="mt-4"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
