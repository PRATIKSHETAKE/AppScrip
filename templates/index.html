<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Trade Opportunities</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
background:#0b0f0c;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui;
color:#e5e7eb;
}

/* Card */

.card{
background:#111714;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.8);
border:1px solid #1f2a24;
}

/* Title */

.title{
font-weight:700;
font-size:28px;
color:#22c55e;
letter-spacing:1px;
}

/* Input */

input{
background:#0b0f0c !important;
border:1px solid #1f2a24 !important;
color:#e5e7eb !important;
padding:12px;
}

input::placeholder{
color:#6b7280;
}

/* Button */

.btn-primary{
background:#22c55e;
border:none;
font-weight:600;
transition:0.25s;
}

.btn-primary:hover{
background:#16a34a;
transform:translateY(-1px);
box-shadow:0 5px 15px rgba(34,197,94,0.4);
}

/* Result */

#result{
margin-top:25px;
line-height:1.8;
color:#e5e7eb;
}

/* FIX: ensure markdown text stays white */

#result *{
color:#e5e7eb;
}

/* Loading */

#loading{
margin-top:20px;
color:#9ca3af;
}

.spinner-border{
color:#22c55e;
}

/* Result formatting */

#result h1,#result h2,#result h3{
color:#22c55e;
margin-top:18px;
}

#result ul{
padding-left:18px;
}

#result li{
margin-bottom:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card p-4">

<h2 class="text-center title mb-4">AI Trade Opportunities</h2>

<div class="input-group">

<input id="sector" class="form-control"
placeholder="Enter sector (technology, finance, healthcare...)">

<button class="btn btn-primary px-4" onclick="analyze()">
Analyze
</button>

</div>

<div id="loading" style="display:none" class="text-center">

<div class="spinner-border mt-4"></div>
<p class="mt-2">Analyzing market data...</p>

</div>

<div id="result"></div>

</div>

</div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
