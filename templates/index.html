<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI Trade Opportunities</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
background: linear-gradient(135deg,#0f172a,#020617);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family: system-ui;
color:white;
}

/* Card */

.card{
background:#1e293b;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
border:none;
}

/* Title */

.title{
font-weight:700;
font-size:28px;
color:#60a5fa;
}

/* Input */

input{
background:#0f172a !important;
border:1px solid #334155 !important;
color:white !important;
}

input::placeholder{
color:#94a3b8;
}

/* Button */

.btn-primary{
background:#3b82f6;
border:none;
}

.btn-primary:hover{
background:#2563eb;
}

/* Result */

#result{
margin-top:25px;
line-height:1.7;
color:#e2e8f0;
}

/* Loading */

#loading{
margin-top:20px;
}

.spinner-border{
color:#3b82f6;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card p-4">

<h2 class="text-center title mb-4">AI Trade Opportunities</h2>

<div class="input-group">

<input id="sector" class="form-control"
placeholder="Enter sector (technology, finance, healthcare...)">

<button class="btn btn-primary px-4" onclick="analyze()">
Analyze
</button>

</div>

<div id="loading" style="display:none" class="text-center">

<div class="spinner-border mt-4"></div>
<p class="mt-2">Analyzing market data...</p>

</div>

<div id="result"></div>

</div>

</div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
